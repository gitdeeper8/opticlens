# 🔭 OPTICLENS Pre-commit Configuration
# Optical Phenomena, Turbulence & Imaging --- Light Environmental Nonlinearity System

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Clean trailing whitespace
      - id: end-of-file-fixer
        name: Ensure EOF newline
      - id: check-yaml
        name: Validate YAML syntax
        args: [--allow-multiple-documents]
      - id: check-json
        name: Validate JSON syntax
      - id: check-toml
        name: Validate TOML syntax
      - id: check-added-large-files
        name: Prevent large files
        args: [--maxkb=20480]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        name: Format Python code (Black)
        language_version: python3
        args: [--line-length=88, --target-version=py310]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports (isort)
        args: ["--profile", "black", "--line-length=88"]

  - repo: local
    hooks:
      - id: validate-mie-scattering
        name: Validate Mie scattering calculations
        entry: python scripts/validate_mie.py --accuracy 1e-6
        language: system
        files: ^opticlens/physics/mie/.*\.py$
        pass_filenames: false
        
      - id: check-edlen-equation
        name: Check Edlén refractive index calculations
        entry: python scripts/check_edlen.py --tolerance 1e-9
        language: system
        files: ^opticlens/physics/refractive/.*\.py$
        pass_filenames: false

      - id: validate-turbulence-models
        name: Validate Cn2 and scintillation calculations
        entry: python scripts/validate_turbulence.py --reference-tables
        language: system
        files: ^opticlens/physics/turbulence/.*\.py$
        pass_filenames: false
        
      - id: check-halo-simulator
        name: Check ice crystal halo simulations
        entry: python scripts/check_halo.py --angle-tolerance 0.1
        language: system
        files: ^opticlens/simulation/halo/.*\.py$
        pass_filenames: false
