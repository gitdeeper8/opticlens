# .readthedocs.yaml - OPTICLENS Documentation
# Optical Phenomena, Turbulence & Imaging --- Light Environmental Nonlinearity System

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

# Build documentation with Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# Optional formats
formats:
  - pdf
  - epub

# Python requirements
python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - docs

# Build settings
submodules:
  include: all
  recursive: true

search:
  ranking:
    api/*: 3
    physics/*: 5
    tutorials/*: 2
